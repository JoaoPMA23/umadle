<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>UMADLE</title>
    <!-- Fontes do Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Nunito:wght@400;700;800&display=swap"
        rel="stylesheet">

    <!-- Efeitos de Chuva de Confetes -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

    <!-- Link para a folha de estilos extraída -->
    <link href="style.css" rel="stylesheet">
</head>

<body>
    <header class="app-header">
        <div class="header-content">
            <div class="header-left">
                <button class="icon-btn" title="Stats" id="stats-btn">📊</button>
            </div>
            <nav class="mode-nav" id="mode-nav">
                <button class="mode-btn active" data-mode="classic">Classic</button>
                <button class="mode-btn" data-mode="support">Support</button>
                <button class="mode-btn" data-mode="splash">Splash</button>
                <button class="mode-btn disabled" data-mode="quote">Quote</button>
                <button class="mode-btn" data-mode="emoji">Emoji</button>
            </nav>
            <div class="header-right">
                <button class="icon-btn" title="Settings" id="settings-btn">⚙️</button>
            </div>
        </div>
    </header>

    <div class="wrap">
        <h1>UMADLE</h1>
        <div class="sub">Uma Musume - Pretty Derby</div>
        <div class="divider"></div>
        <p style="text-align:center;color:var(--text-muted);font-size:0.83rem;margin-bottom:14px" data-i18n="subtitle">
            Guess the Uma Musume!
        </p>

        <!-- Container de Emojis do Modo Específico -->
        <div id="mode-hint"
            style="display:none; font-size: 2.7rem; text-align: center; margin-bottom: 24px; letter-spacing: 8px;">
        </div>

        <!-- Container de Splash (Arte) do Modo Específico -->
        <div id="splash-container" style="display:none; width: 260px; height: 260px; margin: 0 auto 24px; overflow: hidden; border-radius: 12px; border: 2px solid var(--input-border); position: relative; background: #000;">
            <img id="splash-img" src="" style="width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);">
        </div>

        <!-- Container principal de input -->
        <div class="search-wrapper">
            <input id="search-input" data-i18n-ph="placeholder" placeholder="Type an Uma Musume's name..." autocomplete="off">
            <button class="search-btn" id="search-btn" aria-label="Search">&#128269;</button>
            <div class="dropdown" id="dropdown-menu" style="display:none"></div>
        </div>

        <!-- Box de Dicas (Hints) -->
        <div id="hints-container" class="hints-container" style="display:none">
            <div id="hint-1" class="hint-box"></div>
            <div id="hint-2" class="hint-box"></div>
        </div>

        <!-- Legenda -->
        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot correct"></div><span data-i18n="legend_correct">Correct</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot partial"></div><span data-i18n="legend_partial">Partial (Close)</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot wrong"></div><span data-i18n="legend_wrong">Wrong</span>
            </div>
        </div>

        <!-- Numerador de tentativas -->
        <div class="counter" id="counter"></div>

        <!-- Tabela do jogo (Aparece quando houver chutes) -->
        <div class="table-wrapper" id="table-wrapper" style="display:none">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Surface</th>
                        <th>Distance</th>
                        <th>Strategy</th>
                        <th>Height</th>
                        <th>G1 Wins</th>
                        <th>Birth Year</th>
                        <th>Release Year</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <!-- Modal de Resultado (Vitória ou Derrota) -->
        <div id="result-box"></div>
    </div>

    <!-- Feedback Toast -->
    <div id="toast" class="toast">Message</div>

    <!-- Modal de Estatísticas -->
    <div id="stats-modal" class="modal-overlay" style="display:none">
        <div class="modal-content">
            <button class="modal-close" id="stats-close">&times;</button>
            <h2><span data-i18n="stats_title">STATISTICS</span> (<span id="stats-mode-name"></span>)</h2>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-num" id="stat-played">0</div>
                    <div class="stat-label" data-i18n="stat_played">Played</div>
                </div>
                <div class="stat-item">
                    <div class="stat-num" id="stat-winpct">0</div>
                    <div class="stat-label" data-i18n="stat_winpct">Win %</div>
                </div>
                <div class="stat-item">
                    <div class="stat-num" id="stat-streak">0</div>
                    <div class="stat-label" data-i18n="stat_streak">Current Streak</div>
                </div>
                <div class="stat-item">
                    <div class="stat-num" id="stat-maxstreak">0</div>
                    <div class="stat-label" data-i18n="stat_maxstreak">Max Streak</div>
                </div>
            </div>
            <h3 style="font-size: 0.9rem; margin-bottom: 15px; color: var(--gold); text-align: center; letter-spacing: 1px;" data-i18n="stat_dist">GUESS DISTRIBUTION</h3>
            <div class="stats-dist" id="stats-dist">
                <!-- Barras construídas via JS -->
            </div>
        </div>
    </div>

    <!-- Modal de Configurações -->
    <div id="settings-modal" class="modal-overlay" style="display:none">
        <div class="modal-content" style="max-width: 320px;">
            <button class="modal-close" id="settings-close">&times;</button>
            <h2 data-i18n="settings_title">SETTINGS</h2>
            
            <div class="settings-group">
                <div class="setting-item">
                    <label for="theme-select" data-i18n="set_theme">Theme</label>
                    <select id="theme-select" class="setting-select">
                        <option value="dark" data-i18n="set_dark">Dark</option>
                        <option value="light" data-i18n="set_light">Light</option>
                    </select>
                </div>
                
                <div class="setting-item">
                    <label for="lang-select" data-i18n="set_lang">Language</label>
                    <select id="lang-select" class="setting-select">
                        <option value="en">English</option>
                        <option value="pt-br">Português (BR)</option>
                    </select>
                </div>
                
                <div class="setting-item">
                    <label for="mute-toggle" data-i18n="set_mute">Mute Sounds</label>
                    <label class="switch">
                        <input type="checkbox" id="mute-toggle">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- Script separado extraído -->
    <script type="module" src="js/main.js"></script>
</body>

</html>

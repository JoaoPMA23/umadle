<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umadle | Painel Administrativo</title>
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            /* Zinc 950 */
            --card-bg: #18181b;
            /* Zinc 900 */
            --border: #27272a;
            /* Zinc 800 */
            --border-hover: #3f3f46;
            --text: #f4f4f5;
            /* Zinc 50 */
            --text-muted: #a1a1aa;
            /* Zinc 400 */
            --primary: #8b5cf6;
            /* Violet 500 */
            --primary-hover: #7c3aed;
            /* Violet 600 */
            --danger: #ef4444;
            --success: #10b981;
            --ring: rgba(139, 92, 246, 0.3);
            --radius: 8px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 2rem;
            margin: 0;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h1,
        h2 {
            margin-top: 0;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text);
        }

        h1 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }

        h1 span {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 500;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.25rem;
            margin-bottom: 1.25rem;
        }

        .form-group {
            margin-bottom: 0;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        input,
        select {
            width: 100%;
            padding: 0.625rem 0.75rem;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            border-radius: var(--radius);
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--ring);
        }

        input[type="color"] {
            padding: 0.2rem;
            height: 38px;
            cursor: pointer;
        }

        button {
            background: var(--primary);
            color: white;
            padding: 0.625rem 1rem;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-success {
            background: var(--success);
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-cancel:hover {
            background: var(--border);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        /* Custom Dropdown Styles */
        .custom-select {
            position: relative;
            width: 100%;
            font-size: 0.875rem;
        }

        .select-box {
            padding: 0.45rem 0.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            min-height: 38px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: border-color 0.2s;
        }

        .select-box:hover {
            border-color: var(--border-hover);
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
            flex: 1;
        }

        .tag {
            background: var(--border);
            color: var(--text);
            padding: 0.125rem 0.5rem;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .tag-remove {
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
        }

        .tag-remove:hover {
            color: var(--danger);
        }

        .placeholder {
            color: #52525b;
        }

        .caret {
            color: var(--text-muted);
            font-size: 0.7rem;
            margin-left: 0.5rem;
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-top: 0.25rem;
            z-index: 10;
            display: none;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .dropdown-menu.show {
            display: block;
        }

        .option {
            padding: 0.625rem 0.75rem;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--bg);
        }

        .option:last-child {
            border-bottom: none;
        }

        .option:hover {
            background: var(--border);
        }

        .option.selected {
            color: var(--primary);
            font-weight: 500;
        }

        .option.selected::after {
            content: '✓';
            font-size: 0.9rem;
        }

        /* Character Grid */
        .character-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .char-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: border-color 0.2s;
        }

        .char-card:hover {
            border-color: var(--border-hover);
        }

        .char-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .char-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--border);
        }

        .char-info h3 {
            margin: 0 0 0.25rem 0;
            font-size: 1rem;
            color: var(--text);
        }

        .char-info p {
            margin: 0;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .char-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: auto;
        }

        .char-actions button {
            flex: 1;
            padding: 0.4rem;
            font-size: 0.8rem;
        }

        #auth-section,
        #admin-section {
            display: none;
        }

        #edit-mode-badge {
            display: none;
            background: var(--primary);
            color: #fff;
            padding: 0.15rem 0.5rem;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            vertical-align: middle;
            margin-left: 0.5rem;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <div class="container">
        <div id="auth-section" class="card" style="max-width: 400px; margin: 15vh auto;">
            <h1 style="border:none; margin-bottom: 0.5rem;">Access Admin</h1>
            <p style="color:var(--text-muted); margin-bottom: 1.5rem; font-size: 0.875rem;">Insira a senha mestra para
                continuar.</p>
            <div class="form-group" style="margin-bottom: 1rem;">
                <input type="password" id="admin-secret" placeholder="••••••••"
                    onkeypress="if(event.key === 'Enter') login()">
            </div>
            <button onclick="login()" style="width: 100%;">Entrar</button>
        </div>

        <div id="admin-section">
            <div class="card" id="form-container">
                <h1>Painel de Controle <span id="edit-mode-badge">MODO EDIÇÃO</span></h1>

                <form id="add-form">
                    <input type="hidden" id="originalName" value="">

                    <div class="form-grid">
                        <div class="form-group">
                            <label>Nome (Inglês Oficial)</label>
                            <input type="text" id="name" required placeholder="Ex: Special Week">
                        </div>
                        <div class="form-group">
                            <label>URL da Imagem (Ícone)</label>
                            <input type="url" id="imageUrl" required placeholder="https://...">
                        </div>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label>Tipo de Pista</label>
                            <div class="custom-select" id="type-wrapper">
                                <div class="select-box" id="type-box">
                                    <div class="tags" id="type-tags"><span class="placeholder">Selecione...</span></div>
                                    <span class="caret">▼</span>
                                </div>
                                <div class="dropdown-menu" id="type-menu">
                                    <div class="option" data-val="Turf">Turf</div>
                                    <div class="option" data-val="Dirt">Dirt</div>
                                </div>
                            </div>
                            <input type="hidden" id="type" required>
                        </div>

                        <div class="form-group">
                            <label>Distância</label>
                            <div class="custom-select" id="distance-wrapper">
                                <div class="select-box" id="distance-box">
                                    <div class="tags" id="distance-tags"><span class="placeholder">Selecione...</span>
                                    </div>
                                    <span class="caret">▼</span>
                                </div>
                                <div class="dropdown-menu" id="distance-menu">
                                    <div class="option" data-val="Sprint">Sprint</div>
                                    <div class="option" data-val="Mile">Mile</div>
                                    <div class="option" data-val="Medium">Medium</div>
                                    <div class="option" data-val="Long">Long</div>
                                </div>
                            </div>
                            <input type="hidden" id="distance" required>
                        </div>

                        <div class="form-group">
                            <label>Estratégia (Style)</label>
                            <div class="custom-select" id="style-wrapper">
                                <div class="select-box" id="style-box">
                                    <div class="tags" id="style-tags"><span class="placeholder">Selecione...</span>
                                    </div>
                                    <span class="caret">▼</span>
                                </div>
                                <div class="dropdown-menu" id="style-menu">
                                    <div class="option" data-val="Front Runner">Front Runner</div>
                                    <div class="option" data-val="Pace Chaser">Pace Chaser</div>
                                    <div class="option" data-val="Late Surger">Late Surger</div>
                                    <div class="option" data-val="End Closer">End Closer</div>
                                </div>
                            </div>
                            <input type="hidden" id="style" required>
                        </div>
                    </div>

                    <div class="form-grid" style="grid-template-columns: repeat(4, 1fr);">
                        <div class="form-group"><label>Altura (cm)</label><input type="number" id="height" required
                                placeholder="158"></div>
                        <div class="form-group"><label>Vitórias G1</label><input type="number" id="g1Wins" required
                                placeholder="4"></div>
                        <div class="form-group"><label>Ano Nasc.</label><input type="number" id="birthYear" required
                                placeholder="1995"></div>
                        <div class="form-group"><label>Lançamento</label><input type="number" id="releaseYear" required
                                placeholder="2021"></div>
                    </div>

                    <div class="form-group" style="margin-bottom: 1.25rem;">
                        <label>Cor do Ícone (Hex)</label>
                        <input type="color" id="dotColor" value="#8b5cf6" required style="max-width: 150px;">
                    </div>

                    <div style="display: flex; gap: 0.75rem;">
                        <button type="submit" id="submit-btn" class="btn-success">✨ Adicionar Personagem</button>
                        <button type="button" id="cancel-btn" class="btn-cancel" style="display:none;"
                            onclick="cancelEdit()">Cancelar Edição</button>
                    </div>
                </form>
                <div id="feedback"
                    style="min-height: 20px; text-align: left; margin-top: 1rem; font-size: 0.875rem; font-weight: 500;">
                </div>
            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h2 style="margin: 0;">Garotas na Pista</h2>
                    <span
                        style="background: var(--border); padding: 0.25rem 0.75rem; border-radius: 20px; font-weight: 600; font-size: 0.875rem; color: var(--text-muted);"
                        id="char-count">0</span>
                </div>

                <div class="character-grid" id="character-list">
                    <div style="color: var(--text-muted); grid-column: 1/-1; padding: 2rem; text-align: center;">
                        Carregando banco de dados...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>

</html>
